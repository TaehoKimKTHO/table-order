<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매장 테이블 오더 - 포털</title>
    <style>
        :root {
            --primary: #FF3B30;
            --bg: #000000;
            --surface: #1C1C1E;
            --text: #FFFFFF;
            --text-muted: #8E8E93;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Malgun Gothic", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(255, 59, 48, 0.08), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(10, 132, 255, 0.08), transparent 50%);
        }

        .portal-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .logo-area {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 16px;
            margin: 0;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .nav-card {
            background: rgba(28, 28, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px 30px;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .icon-box {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .nav-card:nth-child(1) .icon-box {
            background: linear-gradient(135deg, rgba(255, 59, 48, 0.2), rgba(255, 149, 0, 0.2));
            color: #FF3B30;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.2);
        }

        .nav-card:nth-child(2) .icon-box {
            background: linear-gradient(135deg, rgba(10, 132, 255, 0.2), rgba(94, 92, 230, 0.2));
            color: #0A84FF;
            box-shadow: 0 0 20px rgba(10, 132, 255, 0.2);
        }

        .icon-box svg {
            width: 32px;
            height: 32px;
            stroke-width: 1.5;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <div class="portal-container">
        <div class="logo-area">
            <h1>SBS구내식당</h1>
            <p>UI 화면 목업 포털</p>
        </div>

        <div class="nav-grid">
            <!-- Customer App -->
            <a href="customer-login.html" class="nav-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                        <line x1="12" y1="18" x2="12.01" y2="18"></line>
                    </svg>
                </div>
                <div class="card-title">고객용 태블릿 장비</div>
                <div class="card-desc">테이블에 설치되는 메뉴 및 주문 확인 장비 화면입니다.</div>
            </a>

            <!-- Admin App -->
            <a href="admin-login.html" class="nav-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                </div>
                <div class="card-title">매장 관리자 시스템</div>
                <div class="card-desc">POS 및 관리자 PC에서 주문을 모니터링하는 화면입니다.</div>
            </a>
        </div>
    </div>

</body>

</html>
