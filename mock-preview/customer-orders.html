<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 내역</title>
    <style>
        :root {
            --primary: #FF3B30;
            --bg: #000000;
            --surface: #1C1C1E;
            --text: #FFFFFF;
            --text-muted: #8E8E93;
            --border: rgba(255, 255, 255, 0.1);
            --status-wait: #FF9500;
            --status-prep: #0A84FF;
            --status-done: #30D158;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Malgun Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: var(--surface);
            padding: 24px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 24px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            flex: 1;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .main-content::-webkit-scrollbar {
            width: 8px;
        }

        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .order-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .order-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .order-no {
            font-size: 20px;
            font-weight: 800;
        }

        .order-time {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
        }

        .status-대기중 {
            background: rgba(255, 149, 0, 0.15);
            color: var(--status-wait);
            border: 1px solid rgba(255, 149, 0, 0.3);
        }

        .status-준비중 {
            background: rgba(10, 132, 255, 0.15);
            color: var(--status-prep);
            border: 1px solid rgba(10, 132, 255, 0.3);
        }

        .status-완료 {
            background: rgba(48, 209, 88, 0.15);
            color: var(--status-done);
            border: 1px solid rgba(48, 209, 88, 0.3);
        }

        .items-list {
            margin-bottom: 24px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .item-name-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-name {
            font-size: 16px;
            font-weight: 600;
        }

        .item-qty {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 800;
        }

        .item-price {
            font-weight: 700;
            color: var(--text-muted);
        }

        .order-footer {
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .total-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }

        .total-price {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 120px 0;
            color: var(--text-muted);
        }

        .empty-icon {
            margin-bottom: 24px;
            color: rgba(255, 255, 255, 0.1);
        }

        .empty-icon svg {
            width: 80px;
            height: 80px;
        }
    </style>
</head>

<body>

    <header>
        <a href="customer-menu.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <h1>주문 내역</h1>
    </header>

    <div class="main-content" id="orderList">
        <!-- JS 렌더링 -->
    </div>

    <script>
        function formatPrice(price) {
            return price.toLocaleString();
        }

        function renderOrders() {
            const container = document.getElementById('orderList');
            const orders = JSON.parse(localStorage.getItem('table_orders') || '[]');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        </div>
                        <h2 style="margin:0 0 8px 0; color:var(--text)">주문 내역이 없습니다</h2>
                        <p style="margin:0;">메뉴 화면에서 맛있는 음식을 주문해보세요.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-meta">
                            <span class="order-no">${order.orderNo}</span>
                            <span class="order-time">${order.time}</span>
                        </div>
                        <span class="status-badge status-${order.status}">${order.status}</span>
                    </div>
                    
                    <div class="items-list">
                        ${order.items.map(item => `
                            <div class="order-item">
                                <div class="item-name-group">
                                    <span class="item-qty">${item.qty}</span>
                                    <span class="item-name">${item.name}</span>
                                </div>
                                <span class="item-price">${formatPrice(item.price * item.qty)}원</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="order-footer">
                        <div>
                            <span class="total-label">총 주문 금액</span>
                            <span class="status-badge" style="background: rgba(255,255,255,0.05); color: var(--text-muted); border: none; padding: 4px 10px; font-size: 13px; font-weight: 500;">나갈 때 한 번에 결제</span>
                        </div>
                        <span class="total-price">${formatPrice(order.total)}원</span>
                    </div>
                </div>
            `).join('');
        }

        renderOrders();
    </script>
</body>

</html>
